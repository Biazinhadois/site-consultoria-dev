<html>

<head>
    <link rel="stylesheet" href="./orcamento.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orcamento | FrontMastery</title>
    <link rel="icon" type="image/png" href="./Imagem/logo.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
</head>

<body>
    
    <div class="titulox">
        <h3>Procurando especialistas com grande habilidade em desenvolvimento e design de produto?<br>Fale conosco!</h3>
    </div>
    <div class="formulario">
        <input type="text" placeholder="Nome Completo" place-holder="Nome Completo">
        <input type="email" placeholder="E-mail">
        <select name="País">
            <option value="Brasil">Brasil</option>
            <option value="Argentina">Argentina</option>
            <option value="Chile">Chile</option>
            <option value="Colombia">Colombia</option>
            <option value="Peru">Peru</option>
        <input type="text" placeholder="Empresa">
        <input type="text" placeholder="Cargo">
        <select name="Servicos">
            <option value="Consultoria">Consultoria</option>
            <option value="Mentoria">Mentoria</option>
            <option value="Treinamento">Treinamento</option>
        </select>
        <select name="Urgência">
            <option value="Imediata">Imediata</option>
            <option value="1-3 meses">1-3 meses</option>
            <option value="3-6 meses">3-6 meses</option>
            <option value="6-12 meses">6-12 meses</option>
            <option value="Não sei">Não sei</option>
        </select>
            <select name="Orçamento">
                <option value="Menos de R$10.000">Menos de R$10.000</option>
                <option value="R$10.000 - R$50.000">R$10.000 - R$50.000</option>
                <option value="R$50.000 - R$100.000">R$50.000 - R$100.000</option>
                <option value="Mais de R$100.000">Mais de R$100.000</option>
    </div>
    <div class="Mensagem">
        <textarea placeholder="Mensagem">Digite sua mensagem aqui...</textarea>
    </div>
</body>

</html>
