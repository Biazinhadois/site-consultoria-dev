<html>

<head>
    <link rel="stylesheet" href=".//Andrei CSS/cadastro.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | FrontMastery</title>
    <!--Icone da aba-->
    <link rel="icon" type="image/png" href="./Imagem/logo.PNG">
    <!-- Fonte Sora Bold 700 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
</head>

<body>

    <main>
        <!--Caixa do cadastro-->
        <section class="cadbox">
            <div class="pfpcad">
                <img src="./Imagem/perfil.png" class="perfil">
            </div>

            <!--Formulário-->
            <form>
                <div class="formcad">
                    <input type="text" placeholder="Nome Completo">
                    <input type="email" placeholder="E-mail">
                    <input type="text" placeholder="CPF/CNPJ">
                    <input type="number" placeholder="Telefone">
                    <input type="password" placeholder="Senha">
                    <input type="password" placeholder="Confirme sua senha">
                </div>
            </form>

            <!--Botão de cadastro-->
            <div class="buttoncad">
                <button type="submit"><a href="./login.html">Cadastre-se</a></button>
            </div>
        </section>

        <!--Título e subtítulos-->
        <div class="maintitlecad">
            <h1>Cadastre-se:</h1>
        </div>
        <div class="subtitle1cad">
            <h3>Complete seu cadastro para começar a acompanhar seu projeto.</h3>
        </div>
        <div class="subtitle2cad">
            <h4>Acompanhe o desenvolvimento do seu site com total transparência e organização.</h4>
        </div>

        <!--Vantagens-->
        <div class="vantagenscad">
            <p>Status do projeto em tempo real<br></p>
            <p>Comunicação direta com a equipe<br></p>
            <p>Documentação direta com a equipe<br></p>
            <p>Entrega organizada</p>
        </div>

        <!--Imagens de check circular-->
        <div class="circlecheck1cad">
            <img src="./Imagem/check.png" alt="check">
        </div>
        <div class="circlecheck2cad">
            <img src="./Imagem/check.png" alt="check">
        </div>
        <div class="circlecheck3cad">
            <img src="./Imagem/check.png" alt="check">
        </div>
        <div class="circlecheck4cad">
            <img src="./Imagem/check.png" alt="check">
        </div>
    </main>
</body>

</html>
