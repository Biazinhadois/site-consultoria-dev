<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Contrato | FrontMastery</title>
    <link rel="icon" type="image/png" href="./Imagem/logo.PNG">
    <link rel="stylesheet" href=".//Eloah CSS/solicitarcontrato.css">


    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

</head>

<body>

    <main class="container">

        <article class="pedido">
            <h2>Plano Start</h2>
            <p class="preco">R$ 497/mês</p>

            <div class="lista">
                <p>✔ Correções simples</p>
                <p>✔ Pequenos ajustes visuais</p>
                <p>✔ Suporte mensal básico</p>
                <p>✔ Até 5 horas de suporte</p>
            </div>
        </article>


        <section class="formulario">
            <h3>Seus Dados</h3>
            <form>
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="Insira seu nome completo">
                </div>

                <div class="input-group">
                    <label>E-mail Corporativo</label>
                    <input type="email" placeholder="email@gmail.com">
                </div>

                <div class="input-group">
                    <label>WhatsApp</label>
                    <input type="number" placeholder="(00) 00000-0000">
                </div>

                <button class="finalizar">Solicitar Contrato</button>
            </form>
        </section>


    </main>

</body>

</html>
